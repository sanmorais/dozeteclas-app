    <title>Blog | Doze Teclas</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --text-muted: #b0b3b8;
        }

        * { box-sizing: border-box; }
        
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header Fixo Estilo App */
        .header {
            width: 100%; max-width: 900px;
            padding: 20px;
            display: flex; align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-dark);
            border-bottom: 1px solid #333;
        }

        .back-btn { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; }

        /* Container do Blog */
        .blog-container {
            width: 100%; max-width: 900px;
            padding: 25px 15px;
        }

        .blog-intro { margin-bottom: 30px; }
        .blog-intro h1 { font-size: 28px; margin: 0 0 10px 0; color: var(--primary); }
        .blog-intro p { color: var(--text-muted); font-size: 16px; margin: 0; }

        /* Grid de Artigos */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); /* Mobile: 1 por linha */
            gap: 20px;
        }

        /* Card Visual do Artigo */
        .article-card {
            position: relative;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #3d444d;
            background-size: cover;
            background-position: center;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .article-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* Overlay Gradiente para Legibilidade */
        .article-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.4) 60%, transparent 100%);
            padding: 20px;
            width: 100%;
        }

        .article-tag {
            background: var(--primary);
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .article-title {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        /* Desktop View: Grid em Mosaico */
        @media (min-width: 768px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 colunas no PC */
            }
            .article-card { height: 260px; }
        }
    </style>
</head>
