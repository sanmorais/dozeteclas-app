<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doze Teclas | Dicionário de Acordes</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --kb-black: #121417;
            --line-thickness: 2px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 420px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }

        .module-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 12px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; opacity: 0.8; }

        .selector-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .btn-sel { 
            background: var(--kb-black); border: 1px solid #444; color: white; 
            padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        .btn-sel.active { background: var(--primary); color: #1e2227; border-color: var(--primary); }

        .chord-select {
            width: 100%;
            background: var(--kb-black);
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            outline: none;
        }

        .results-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 25px 15px;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chord-display-name { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
        
        .chord-display-notes { 
            margin-top: 20px;
            font-size: 15px; 
            color: var(--primary); 
            font-weight: 700; 
            letter-spacing: 1px;
        }

        .piano-container {
            position: relative;
            width: 100%;
            height: 80px;
            background-color: #000;
            padding: var(--line-thickness);
            border-radius: 6px;
            display: flex;
            gap: var(--line-thickness);
            box-sizing: border-box;
        }

        .key-w { flex: 1; background: white; height: 100%; border-radius: 0 0 2px 2px; z-index: 1; }
        .key-b {
            position: absolute; background: var(--kb-black); width: 4.2%; height: 55%; z-index: 2; border-radius: 0 0 3px 3px;
            border-left: 0.5px solid #000; border-right: 0.5px solid #000;
        }

        .key-w.active { background-color: var(--primary) !important; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1); }

        .key-b.active {
            background-color: var(--primary); /* O amarelo de destaque */
            
            /* O Outline: bem marcado e para fora */
            outline: var(--line-thickness) solid var(--kb-black); 
            
            /* Garante que o contorno fique visível sobre as teclas brancas */
            outline-offset: 0px; 
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← VOLTAR</a>
        <span style="font-weight: 800; font-size: 14px; letter-spacing: 1px;">DICIONÁRIO</span>
    </div>

    <div class="module-card">
        <span class="label">Nota Fundamental</span>
        <div class="selector-grid" id="noteSelector" style="margin-bottom:15px;"></div>
        
        <span class="label">Tipo de Acorde</span>
        <select id="chordType" class="chord-select" onchange="updateChord()">
            <optgroup label="Tríades">
                <option value="maj">Maior (Tríade)</option>
                <option value="min">Menor (Tríade)</option>
                <option value="dim">Diminuto (Tríade)</option>
                <option value="aug">Aumentado</option>
            </optgroup>
            <optgroup label="Tétrades (7ª)">
                <option value="maj7">Maj7</option>
                <option value="7">Dominante (7)</option>
                <option value="m7">m7</option>
                <option value="m7b5">m7(b5)</option>
                <option value="dim7">Diminuto (7dim)</option>
            </optgroup>
        </select>
    </div>

    <div class="results-card">
        <div class="chord-display-name" id="chordNameDisplay">C</div>
        <div class="piano-container" id="pianoMain"></div>
        <div class="chord-display-notes" id="chordNotesDisplay">C – E – G</div>
    </div>

    <script>
        // --- MOTOR DE SOM (WEB AUDIO API) ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();

	function playTone(freq) {
		if (audioCtx.state === 'suspended') audioCtx.resume();
		
		// Puxa as configurações do Ajustes (LocalStorage)
		const savedTimbre = localStorage.getItem('dt_timbre') || 'triangle';
		const savedVol = (localStorage.getItem('dt_volume') || 15) / 100;
		const savedSus = parseFloat(localStorage.getItem('dt_sustain') || 0.6);

		const osc = audioCtx.createOscillator();
		const gain = audioCtx.createGain();
		
		osc.type = savedTimbre; // Usa o timbre escolhido
		osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
		
		gain.gain.setValueAtTime(savedVol, audioCtx.currentTime); // Usa o volume escolhido
		gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + savedSus);
		
		osc.connect(gain);
		gain.connect(audioCtx.destination);
		
		osc.start();
		osc.stop(audioCtx.currentTime + savedSus); // Usa a duração escolhida
	}


        function getFreq(noteIdx) {
            // C3 base a 130.81Hz
            return 130.81 * Math.pow(2, noteIdx / 12);
        }

        function playChord(notesArray) {
            notesArray.forEach((note, i) => {
                setTimeout(() => playTone(getFreq(note)), i * 35);
            });
        }

        // --- LÓGICA DO DICIONÁRIO ---
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CHORDS = {
            "maj": { name: "", intervals: [0, 4, 7] },
            "min": { name: "m", intervals: [0, 3, 7] },
            "dim": { name: "dim", intervals: [0, 3, 6] },
            "aug": { name: "aug", intervals: [0, 4, 8] },
            "maj7": { name: "Maj7", intervals: [0, 4, 7, 11] },
            "7": { name: "7", intervals: [0, 4, 7, 10] },
            "m7": { name: "m7", intervals: [0, 3, 7, 10] },
            "m7b5": { name: "m7(b5)", intervals: [0, 3, 6, 10] },
            "dim7": { name: "dim7", intervals: [0, 3, 6, 9] }
        };

        let currentRoot = 0;

        function init() {
            const grid = document.getElementById('noteSelector');
            NOTES.forEach((n, i) => {
                const b = document.createElement('button');
                b.className = 'btn-sel' + (i === 0 ? ' active' : '');
                b.innerText = n;
                b.onclick = (e) => {
                    document.querySelectorAll('#noteSelector .btn-sel').forEach(x => x.classList.remove('active'));
                    e.target.classList.add('active');
                    currentRoot = i;
                    updateChord();
                };
                grid.appendChild(b);
            });
            // O som não toca no init para evitar disparos automáticos sem interação
            updateChord(false); 
        }

        function updateChord(shouldPlaySound = true) {
            const type = document.getElementById('chordType').value;
            const chordData = CHORDS[type];
            const nameDisplay = document.getElementById('chordNameDisplay');
            const notesDisplay = document.getElementById('chordNotesDisplay');
            
            nameDisplay.innerText = NOTES[currentRoot] + chordData.name;
            
            const absoluteNotes = chordData.intervals.map(iv => (currentRoot + iv));
            notesDisplay.innerText = absoluteNotes.map(n => NOTES[n % 12]).join(" – ");
            
            drawKeyboard('pianoMain', absoluteNotes);

            // Toca o som apenas se houver interação do usuário
            if (shouldPlaySound) {
                playChord(absoluteNotes);
            }
        }

        function drawKeyboard(id, activeNotes) {
            const p = document.getElementById(id);
            p.innerHTML = '';
            const whiteKeyNotes = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23];
            
            whiteKeyNotes.forEach((noteValue) => {
                const key = document.createElement('div');
                key.className = 'key-w';
                if (activeNotes.includes(noteValue)) key.classList.add('active');
                p.appendChild(key);
            });

            const blackKeyMap = [
                {n: 1, pos: 4.8}, {n: 3, pos: 12}, {n: 6, pos: 26.2}, {n: 8, pos: 33.4}, {n: 10, pos: 40.5},
                {n: 13, pos: 54.8}, {n: 15, pos: 62}, {n: 18, pos: 76.2}, {n: 20, pos: 83.4}, {n: 22, pos: 90.5}
            ];

            blackKeyMap.forEach(item => {
                const key = document.createElement('div');
                key.className = 'key-b';
                key.style.left = item.pos + '%';
                if (activeNotes.includes(item.n)) key.classList.add('active');
                p.appendChild(key);
            });
        }

        init();
    </script>
</body>
</html>
