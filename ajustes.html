<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-14023770857"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-14023770857');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doze Teclas | Configurações</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --kb-black: #121417;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }

        .settings-container {
            width: 100%;
            max-width: 400px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* AJUSTE NO CARD PARA DAR RESPIRO */
        .settings-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            padding-top: 50px; /* ESPAÇO DE UMA LINHA PARA O BOTÃO FICAR SOZINHO */
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        /* BOTÃO SOZINHO NO TOPO */
        .help-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            width: 28px;
            height: 28px;
            background-color: rgba(255, 197, 2, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        .help-btn:hover { background: var(--primary); color: var(--bg-dark); }

        /* MODAL */
        .modal-help {
            display: none; position: fixed; z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background-color: var(--card-bg); padding: 40px 25px; border-radius: 25px;
            border: 1px solid var(--primary); position: relative; text-align: center;
            width: 100%; max-width: 380px;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; color: var(--text-white); font-size: 30px; cursor: pointer; }

        .section-label { font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
        .timbre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;}
        .opt-btn { background: var(--kb-black); border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; text-align: center; height: 60px;}
        .opt-btn.active { background: var(--primary); color: var(--bg-dark); border-color: var(--primary); }
        .volume-control { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        input[type=range] { flex: 1; appearance: none; background: var(--kb-black); height: 6px; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; }
        .val-display { font-size: 14px; font-weight: 800; color: var(--primary); min-width: 35px; }
        .footer-info { text-align: center; margin-top: 40px; font-size: 11px; opacity: 0.4; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← VOLTAR</a>
        <span style="font-weight: 800; font-size: 14px; letter-spacing: 1px;">AJUSTES</span>
    </div>

    <div class="settings-container">
        
        <div>
            <span class="section-label">Timbre</span>
            <div class="settings-card">
                <div class="help-btn" onclick="openHelp()">?</div>
                <p></p>

                <div class="timbre-grid">
                    <button class="opt-btn" onclick="setTimbre('triangle', this)" id="btn-triangle">PIANO ELÉTRICO</button>
                    <button class="opt-btn" onclick="setTimbre('sine', this)" id="btn-sine">PURO</button>
                    <button class="opt-btn" onclick="setTimbre('square', this)" id="btn-square">RETRÔ</button>
                    <button class="opt-btn" onclick="setTimbre('sawtooth', this)" id="btn-sawtooth">BRILHANTE</button>
                </div>
            </div>
        </div>

        <div>
            <span class="section-label">Volume</span>
            <div class="settings-card" style="padding-top: 20px;"> <div class="volume-control">
                    <svg width="20" height="20" viewBox="0 0 24 24" style="fill: var(--primary); vertical-align: middle; margin-right: 8px;">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <input type="range" id="volumeSlider" min="0" max="100" value="15" oninput="setVolume(this.value)">
                    <span class="val-display" id="volValue">15%</span>
                </div>
            </div>
        </div>

        <div>
            <span class="section-label">Duração da Nota</span>
            <div class="settings-card" style="padding-top: 20px;">
                <div class="volume-control">
                    <svg width="20" height="20" viewBox="0 0 24 24" style="fill: var(--primary); vertical-align: middle; margin-right: 8px;">
                        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                    </svg>
                    <input type="range" id="sustainSlider" min="2" max="20" value="6" oninput="setSustain(this.value)">
                    <span class="val-display" id="susValue">0.6s</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        DOZE TECLAS v1.0<br>
        Toque nos timbres para ouvir o preview.
    </div>

    <div id="helpModal" class="modal-help">
        <div class="modal-content">
            <span class="close-modal" onclick="closeHelp()">&times;</span>
            <h3 style="color: var(--primary); text-transform: uppercase; margin-bottom: 15px;">Guia de Ajustes</h3>
            <p style="color: var(--text-muted); line-height: 1.6; font-size: 14px; text-align: left;">
                • <b>Timbre:</b> Altera a forma da onda sonora.<br><br>
                • <b>Volume:</b> Ajusta a intensidade de saída.<br><br>
                • <b>Duração:</b> Controla o tempo de sustentação da nota.
            </p>
        </div>
    </div>

    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let config = {
            timbre: localStorage.getItem('dt_timbre') || 'triangle',
            volume: localStorage.getItem('dt_volume') || 15,
            sustain: localStorage.getItem('dt_sustain') || 0.6
        };

        function playPreview(type) {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.setValueAtTime(1500, audioCtx.currentTime); 
            osc.type = type;
            osc.frequency.setValueAtTime(261.63, audioCtx.currentTime);
            const vol = document.getElementById('volumeSlider').value / 100;
            const sus = parseFloat(document.getElementById('sustainSlider').value / 10);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + sus);
            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + sus);
        }

        function init() {
            document.getElementById('btn-' + config.timbre).classList.add('active');
            document.getElementById('volumeSlider').value = config.volume;
            document.getElementById('volValue').innerText = config.volume + '%';
            document.getElementById('sustainSlider').value = config.sustain * 10;
            document.getElementById('susValue').innerText = config.sustain + 's';
        }

        function setTimbre(type, btn) {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            localStorage.setItem('dt_timbre', type);
            playPreview(type);
        }

        function setVolume(val) { document.getElementById('volValue').innerText = val + '%'; localStorage.setItem('dt_volume', val); }
        function setSustain(val) { let seconds = (val / 10).toFixed(1); document.getElementById('susValue').innerText = seconds + 's'; localStorage.setItem('dt_sustain', seconds); }
        function openHelp() { document.getElementById('helpModal').style.display = 'flex'; }
        function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('helpModal')) closeHelp(); }

        init();
    </script>
</body>
</html>
