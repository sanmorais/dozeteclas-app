    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --icon-bg: rgba(255, 197, 2, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box {
            width: 60px; height: 60px; 
            border-radius: 15px;
            margin: 0 auto 0px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-box img {
            width: 50%;
            height: 50%;
            object-fit: contain;
        }

        .app-title {
            color: var(--primary);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
        }

        .app-subtitle {
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 colunas */
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .menu-item:active {
            transform: scale(0.95);
            background-color: #353b45;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background-color: var(--icon-bg);
            border-radius: 12px;
            display: flex;
            align-items: center; justify-content: center;
            margin-bottom: 12px;
        }

        .icon-box svg {
            width: 26px;
            height: 26px;
            fill: var(--primary);
        }

        .menu-label {
            color: var(--text-white);
            font-size: 12px; /* Reduzi levemente para caber melhor no mobile */
            font-weight: 700;
            text-align: center;
        }

        /* Ícone Hamburger */
        .menu-icon {
            position: absolute;
            top: 25px;
            left: 20px;
            cursor: pointer;
            z-index: 100;
        }

        .bar {
            width: 25px;
            height: 3px;
            background-color: var(--primary);
            margin: 5px 0;
            transition: 0.4s;
            border-radius: 2px;
        }

        /* Menu Lateral */
        .side-menu {
            height: 100%;
            width: 0; /* Começa fechado */
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(18, 20, 23, 0.98); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .menu-content a {
            padding: 15px 20px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
            font-weight: 600;
        }

        .menu-content a:hover {
            color: var(--primary);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
            color: var(--primary);
            text-decoration: none;
        }

        /* Destaque para Cursos */
        .highlight-menu {
            color: var(--primary) !important;
            border-left: 4px solid var(--primary);
            background: rgba(255, 197, 2, 0.05);
        }

    </style>
</head>
