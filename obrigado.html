<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-08QR6T5GD9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-08QR6T5GD9');
    </script>
    <title>Mensagem Recebida | Doze Teclas</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .success-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .icon-check {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        h1 { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; line-height: 1.5; }

        .btn-home {
            background-color: var(--primary);
            color: #121417;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-home:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-check">✓</div>
        <h1>MENSAGEM ENVIADA!</h1>
        <p>Obrigado pelo feedback. Sua sugestão já foi encaminhada para o laboratório Doze Teclas.</p>
        <a href="index.html" class="btn-home">Voltar ao Início</a>
    </div>

</body>
</html>
