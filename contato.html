<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-08QR6T5GD9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-08QR6T5GD9');
    </script>
    <title>Doze Teclas | Contato</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --kb-black: #121417;
            --input-bg: #1a1e23;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; 
            padding: 20px 15px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* CABEÇALHO PADRONIZADO */
        .header { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        
        .back-btn { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
        }

        /* CARD DE CONTATO */
        .contact-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px; 
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { 
            color: var(--primary); 
            text-transform: uppercase; 
            font-weight: 800;
            letter-spacing: 2px; 
            margin: 0 0 10px 0; 
            font-size: 22px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* FORMULÁRIO */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            background-color: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* BOTÃO PADRÃO DOZE TECLAS */
        .btn-submit {
            background-color: var(--primary);
            color: var(--kb-black);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* SEÇÃO DE LINKS SOCIAIS (Removida do Sobre) */
        .social-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--kb-black);
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: var(--primary);
        }

        @media (max-width: 400px) {
            .social-links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← VOLTAR</a>
        <span style="font-weight: 800; font-size: 14px; text-transform: uppercase;">CONTATO</span>
    </div>

    <div class="contact-card">
        <h2>FALE COM O DOZE TECLAS</h2>
        <p class="subtitle">Dúvidas, sugestões ou parcerias? Envie sua mensagem abaixo.</p>

        <form id="meu-form">
            <div class="input-group">
                <label for="name">Nome Completo</label>
                <input type="text" name="name" required placeholder="Ex: Sandro Music">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label for="message">Mensagem</label>
                <textarea name="message" rows="5" required placeholder="Como podemos te ajudar hoje?"></textarea>
            </div>

            <button type="submit" id="btn-submit" class="btn-submit">ENVIAR MENSAGEM</button>
        </form>

        <div class="social-links">
            <a href="https://instagram.com/dozeteclas" target="_blank" class="social-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849s-.011 3.584-.069 4.849c-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07s-3.584-.012-4.849-.07c-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849s.012-3.584.07-4.849c.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948s.014 3.667.072 4.947c.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.281.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.358-2.618-6.78-6.98-6.98-1.281-.058-1.689-.072-4.948-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                Instagram
            </a>
            <a href="mailto:dozeteclas@gmail.com" class="social-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z"/></svg>
                E-mail
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById("meu-form");
        const button = document.getElementById("btn-submit");

        form.addEventListener("submit", function(e) {
            e.preventDefault(); // Impede o navegador de ir para a página do Formspree
            
            button.innerText = "ENVIANDO...";
            button.disabled = true;

            const formData = new FormData(form);

            fetch("https://formspree.io/f/mqegkkad", {
                method: "POST",
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // SUCESSO! Agora sim redirecionamos para onde quisermos
                    window.location.href = "obrigado.html";
                } else {
                    alert("Ocorreu um erro. Tente novamente ou use o e-mail direto.");
                    button.innerText = "ENVIAR MENSAGEM";
                    button.disabled = false;
                }
            }).catch(error => {
                alert("Erro de conexão. Verifique sua internet.");
                button.innerText = "ENVIAR MENSAGEM";
                button.disabled = false;
            });
        });
    </script>

</body>
</html>
