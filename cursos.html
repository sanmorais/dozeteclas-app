<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-08QR6T5GD9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-08QR6T5GD9');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doze Teclas | Cursos</title>
    <style>
        :root {
            --primary: #FFC502;
            --bg-dark: #1E2227;
            --card-bg: #2a2f36;
            --text-white: #ffffff;
            --kb-black: #121417;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 420px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }

        /* CONTAINER DOS CARDS */
        .products-list {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espaço entre os cursos */
        }

        .course-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .course-icon {
            background: var(--kb-black);
            width: 60px; height: 60px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px;
            border: 1px solid var(--primary);
        }

        .course-icon svg { width: 30px; fill: var(--primary); }

        .course-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #FFF; }
        .course-desc { font-size: 14px; color: #aaa; margin-bottom: 20px; line-height: 1.4; }

        .cta-btn {
            background-color: var(--primary);
            color: var(--kb-black);
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            padding: 12px 30px;
            border-radius: 10px;
            transition: transform 0.2s;
            width: 80%;
        }

        .cta-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← VOLTAR</a>
        <span style="font-weight: 800; font-size: 14px; text-transform: uppercase;">Cursos</span>
    </div>

    <div class="products-list">
        
        <div class="course-card">
            <div class="course-icon">
                <svg viewBox="0 0 24 24"><path d="M12 3l10 4.5v9l-10 4.5-10-4.5v-9l10-4.5zm0 2.311l-7.108 3.199 7.108 3.199 7.108-3.199-7.108-3.199zm-8 6.303v5.123l8 3.6 8-3.6v-5.123l-8 3.6-8-3.6z"/></svg>
            </div>
            <div class="course-title">Harmonia Aplicada</div>
            <div class="course-desc">Domine o campo harmônico e as substituições de acordes na prática com um método visual exclusivo.</div>
            <a href="#" class="cta-btn">Acessar Curso</a>
        </div>

        <div class="course-card">
            <div class="course-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2c5.514 0 10 4.486 10 10s-4.486 10-10 10-10-4.486-10-10 4.486-10 10-10zm0-2c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-1 8h2v8h-2v-8zm1-5c.552 0 1 .448 1 1s-.448 1-1 1-1-.448-1-1 .448-1 1-1z"/></svg>
            </div>
            <div class="course-title">Dicionário de Acordes VIP</div>
            <div class="course-desc">Acesso vitalício a uma biblioteca completa de aberturas e voicings para teclado e piano.</div>
            <a href="#" class="cta-btn">Quero o E-book</a>
        </div>

    </div>

</body>
</html>
